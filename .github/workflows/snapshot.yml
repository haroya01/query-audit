name: Publish SNAPSHOT

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'mkdocs.yml'
      - '*.md'

permissions:
  contents: read

jobs:
  snapshot:
    # Skip if this is a release-please PR merge (version won't be SNAPSHOT)
    if: contains(github.event.head_commit.message, 'SNAPSHOT') == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - uses: gradle/actions/setup-gradle@v4

      - name: Check if SNAPSHOT
        id: check
        run: |
          VERSION=$(grep '^version=' gradle.properties | cut -d'=' -f2)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if [[ "$VERSION" == *-SNAPSHOT ]]; then
            echo "is_snapshot=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_snapshot=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and Test
        if: steps.check.outputs.is_snapshot == 'true'
        run: ./gradlew build test

      - name: Publish SNAPSHOT
        if: steps.check.outputs.is_snapshot == 'true'
        run: ./gradlew publish
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          GPG_SIGNING_KEY: ${{ secrets.GPG_SIGNING_KEY }}
          GPG_SIGNING_PASSWORD: ${{ secrets.GPG_SIGNING_PASSWORD }}

      - name: Summary
        if: steps.check.outputs.is_snapshot == 'true'
        run: echo "Published ${{ steps.check.outputs.version }} to OSSRH Snapshots" >> "$GITHUB_STEP_SUMMARY"
